<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FormatFlow™</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#07110a;
  color:white;
}

.container {
  display:flex;
  height:100vh;
}

.left, .middle, .right {
  padding:20px;
  overflow:auto;
}

.left { width:30%; border-right:1px solid #333; }
.middle { width:35%; border-right:1px solid #333; }
.right { width:35%; }

.upload {
  border:2px dashed #2fc66d;
  padding:20px;
  border-radius:12px;
  cursor:pointer;
}

.viewer {
  background:white;
  color:black;
  height:500px;
  overflow:auto;
  border-radius:10px;
  padding:10px;
}

.template {
  padding:10px;
  border:1px solid #444;
  margin:5px 0;
  cursor:pointer;
}

.template.active {
  border-color:gold;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">

<h2>Upload</h2>

<div class="upload" onclick="document.getElementById('file').click()">
Click or Upload File
<input id="file" type="file" style="display:none" onchange="handleUpload(event)">
</div>

<input id="fileName" style="width:100%;margin-top:10px" readonly>

<h3>Action</h3>
<select id="action">
<option>Turn into professional document</option>
<option>Use info to update document</option>
<option>Extract text only</option>
</select>

<textarea id="text" placeholder="Text will appear here"></textarea>

</div>

<!-- MIDDLE (FILE VIEWER) -->
<div class="middle">

<h2>Your File</h2>
<div class="viewer" id="viewer">
Upload file to see it
</div>

</div>

<!-- RIGHT -->
<div class="right">

<h2>Templates</h2>

<div class="template" onclick="selectTemplate('resume',this)">Resume</div>
<div class="template" onclick="selectTemplate('lease',this)">Lease</div>

<button onclick="generate()">Generate</button>

<div class="viewer" id="output">
Preview here
</div>

</div>

</div>

<script>

let selectedTemplate = '';
let extractedText = '';

function handleUpload(e){
  const file = e.target.files[0];
  document.getElementById('fileName').value = file.name;

  if(file.type.startsWith('image/')){
    const url = URL.createObjectURL(file);
    document.getElementById('viewer').innerHTML = `<img src="${url}" style="width:100%">`;

    Tesseract.recognize(file,'eng').then(({data:{text}})=>{
      extractedText = text;
      document.getElementById('text').value = text;
    });
  }

  else if(file.type === 'application/pdf'){
    const url = URL.createObjectURL(file);
    document.getElementById('viewer').innerHTML = `<iframe src="${url}" width="100%" height="100%"></iframe>`;
  }

  else if(file.name.endsWith('.txt')){
    const reader = new FileReader();
    reader.onload = function(e){
      extractedText = e.target.result;
      document.getElementById('text').value = extractedText;
      document.getElementById('viewer').innerHTML = `<pre>${extractedText}</pre>`;
    }
    reader.readAsText(file);
  }

  else if(file.name.endsWith('.docx')){
    const reader = new FileReader();
    reader.onload = function(e){
      mammoth.convertToHtml({arrayBuffer:e.target.result}).then(function(result){
        document.getElementById('viewer').innerHTML = result.value;
        extractedText = result.value.replace(/<[^>]*>/g,'');
        document.getElementById('text').value = extractedText;
      });
    }
    reader.readAsArrayBuffer(file);
  }

}

function selectTemplate(type,el){
  selectedTemplate = type;
  document.querySelectorAll('.template').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

function generate(){
  const text = document.getElementById('text').value || extractedText;

  if(selectedTemplate === 'resume'){
    document.getElementById('output').innerHTML =
    `<h2>Resume</h2><p>${text}</p>`;
  }

  if(selectedTemplate === 'lease'){
    document.getElementById('output').innerHTML =
    `<h2>Lease</h2><p>${text}</p>`;
  }
}

</script>

</body>
</html>
