<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FormatFlow™</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    body {
      margin:0;
      font-family:Arial, sans-serif;
      background:#07110a;
      color:white;
    }

    .container {
      display:flex;
      height:100vh;
    }

    .left, .right {
      padding:20px;
      overflow:auto;
    }

    .left {
      width:45%;
      border-right:1px solid rgba(255,255,255,0.1);
    }

    .right {
      width:55%;
      background:#0d1810;
    }

    h1 {margin-top:0;}

    .upload {
      border:2px dashed #2fc66d;
      padding:20px;
      border-radius:12px;
      cursor:pointer;
    }

    .preview-box {
      background:white;
      color:black;
      padding:20px;
      border-radius:12px;
      min-height:300px;
    }

    .templates {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:15px;
    }

    .template-card {
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      padding:12px;
      border-radius:10px;
      cursor:pointer;
    }

    .template-card:hover {
      border-color:#d7b45a;
    }

    .btn {
      margin-top:10px;
      padding:10px;
      border:none;
      border-radius:8px;
      background:#2fc66d;
      color:black;
      cursor:pointer;
    }

    select, textarea {
      width:100%;
      margin-top:10px;
      padding:10px;
      border-radius:8px;
      border:none;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">

    <h1>FormatFlow™</h1>

    <!-- Upload -->
    <div class="upload" onclick="document.getElementById('file').click()">
      Click or Drop File
      <input id="file" type="file" style="display:none" onchange="handleUpload(event)">
    </div>

    <div id="fileName"></div>

    <!-- AI Decision -->
    <h3>What do you want to do?</h3>
    <select id="action">
      <option>Turn into professional document</option>
      <option>Use info to update document</option>
      <option>Extract text only</option>
    </select>

    <!-- Templates -->
    <h3>Choose Template</h3>
    <div class="templates">
      <div class="template-card" onclick="setTemplate('resume1')">Resume Style 1</div>
      <div class="template-card" onclick="setTemplate('resume2')">Resume Style 2</div>
      <div class="template-card" onclick="setTemplate('resume3')">Resume Style 3</div>
      <div class="template-card" onclick="setTemplate('lease')">Lease Agreement</div>
    </div>

    <!-- Input -->
    <textarea id="input" placeholder="Paste or auto-fill content here"></textarea>

    <button class="btn" onclick="generate()">Generate</button>

    <!-- Pricing -->
    <h3>Pricing</h3>
    <button class="btn">$2.99 Download</button>

  </div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <h2>Preview</h2>

    <div class="preview-box" id="preview">
      Your document will appear here
    </div>

  </div>

</div>

<script>

let currentTemplate = '';

function handleUpload(e) {
  const file = e.target.files[0];
  document.getElementById('fileName').innerText = file.name;

  if(file.type.startsWith('image/')){
    Tesseract.recognize(file, 'eng').then(({data:{text}})=>{
      document.getElementById('input').value = text;
    });
  }
}

function setTemplate(type){
  currentTemplate = type;
}

function generate(){
  let text = document.getElementById('input').value;

  if(currentTemplate.includes('resume')){
    document.getElementById('preview').innerHTML = `
      <h2>Resume</h2>
      <p>${text}</p>
    `;
  }

  if(currentTemplate==='lease'){
    document.getElementById('preview').innerHTML = `
      <h2>Lease Agreement</h2>
      <p>${text}</p>
    `;
  }
}

</script>

</body>
</html>
